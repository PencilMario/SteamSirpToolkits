<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PP的Steam工具箱 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: 'Courier New', monospace;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .help-text {
      color: #999;
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.5;
    }

    .help-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .help-link:hover {
      text-decoration: underline;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-save:active {
      transform: translateY(0);
    }

    .btn-reset {
      background: #f5f5f5;
      color: #333;
      border: 2px solid #e0e0e0;
    }

    .btn-reset:hover {
      background: #efefef;
    }

    .status {
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 25px;
      font-size: 13px;
      color: #333;
      line-height: 1.6;
    }

    .info-box strong {
      color: #667eea;
    }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 30px 0;
    }

    .section-title {
      color: #333;
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .feature-list {
      list-style: none;
      padding: 0;
      margin-bottom: 25px;
    }

    .feature-list li {
      padding: 8px 0;
      color: #666;
      font-size: 13px;
      display: flex;
      align-items: center;
    }

    .feature-list li:before {
      content: "✓";
      color: #667eea;
      font-weight: bold;
      margin-right: 10px;
      font-size: 16px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .checkbox-label {
      color: #333;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ 设置</h1>
    <p class="subtitle">PP的Steam工具箱</p>

    <div class="info-box">
      <strong>🔑 需要 Steam Web API Key</strong><br>
      为了识别家庭库中的游戏，您需要提供您的 Steam Web API Key。
      <a href="https://steamcommunity.com/dev/apikey" class="help-link" target="_blank">点击这里获取</a>
    </div>

    <form id="settingsForm">
      <div class="form-group">
        <label for="apiKey">Steam Web API Key</label>
        <input
          type="password"
          id="apiKey"
          placeholder="输入您的 API Key"
          autocomplete="off"
        >
        <div class="help-text">
          您的 API Key 仅存储在本地，永远不会发送到任何服务器。
          <br><br>
          <strong>如何获取：</strong>
          <ol style="margin-left: 20px; margin-top: 8px;">
            <li>访问 <a href="https://steamcommunity.com/dev/apikey" class="help-link" target="_blank">Steam API 注册页面</a></li>
            <li>登录您的 Steam 账户</li>
            <li>输入任意域名（如 localhost）</li>
            <li>同意 Terms of Use</li>
            <li>复制您的 API Key</li>
          </ol>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="showDebugPanel" />
        <label for="showDebugPanel" class="checkbox-label">显示调试窗口</label>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-save">保存设置</button>
        <button type="button" class="btn-reset" id="clearBtn">清除数据</button>
      </div>

      <div class="status" id="status"></div>
    </form>

    <hr>

    <div>
      <h3 class="section-title">功能</h3>
      <ul class="feature-list">
        <li>在搜索结果中标记家庭库游戏</li>
        <li>转换库存页面的 UTC 时间为本地时间</li>
        <li>离线运行 - 数据不上传</li>
      </ul>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
